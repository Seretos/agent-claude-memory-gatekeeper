name: lint

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Validate plugin.json is valid JSON
        run: jq empty .claude-plugin/plugin.json

      - name: Validate hooks.json is valid JSON
        run: jq empty hooks/hooks.json

      - name: Check hook script syntax
        run: node --check scripts/memory-gatekeeper-hook.mjs

      - name: Run hook tests
        run: node scripts/memory-gatekeeper-hook.test.mjs
